  <link rel="icon" href="REPORTING_DOMAIN/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/govuk-frontend.min.css">
  <title>Download daily Trade Tariff report files - GOV.UK</title>
  <style>
    @font-face {
      font-family: "GDS Transport";
      font-style: normal;
      font-weight: 400;
      src: url("https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/assets/fonts/light-94a07e06a1-v2.woff2") format("woff2"),
        url("https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/assets/fonts/light-f591b13f7d-v2.woff") format("woff");
      font-display: fallback;
    }

    @font-face {
      font-family: "GDS Transport";
      font-style: normal;
      font-weight: 700;
      src: url("https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/assets/fonts/bold-b542beb274-v2.woff2") format("woff2"),
        url("https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/assets/fonts/bold-affa96571d-v2.woff") format("woff");
      font-display: fallback;
    }

    .reporting-results {
      border-top: 2px solid #1d70b8;
      padding-top: 20px;
    }

    .reporting-results + .reporting-results {
      margin-top: 30px;
    }

    .reporting-service-status {
      min-height: 30px;
    }

    .reporting-table-wrapper {
      overflow-x: auto;
    }

    [hidden] {
      display: none !important;
    }

    .reporting-govuk-dot {
      color: #00ffe0;
    }
  </style>
</head>

<body class="govuk-template__body">
  <script>
    document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');
  </script>

          <svg focusable="false" role="presentation" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 60" height="30" width="32" fill="currentcolor" class="govuk-header__logotype" aria-hidden="true">

            </g>
          </svg>
          <span class="govuk-header__product-name">
            GOV<span class="reporting-govuk-dot">.</span>UK
          </span>
        </a>
      </div>
    </div>
  </header>

  <section class="govuk-service-navigation" data-module="govuk-service-navigation" aria-label="Service information">
    <div class="govuk-width-container">
      <div class="govuk-service-navigation__container">
        <span class="govuk-service-navigation__service-name">
          <a href="/" class="govuk-service-navigation__link">
            UK Integrated Online Tariff
          </a>
        </span>
      </div>
    </div>
  </section>

  <div class="govuk-width-container">
    <main class="govuk-main-wrapper" id="main-content">
      <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
          <span class="govuk-caption-l">UK Integrated Online Tariff</span>
          <h1 class="govuk-heading-xl">Download daily Trade Tariff report files</h1>

          <form id="reporting-form" class="govuk-!-margin-bottom-8">
            <div class="govuk-form-group" id="report-date-group">
              <label class="govuk-label govuk-label--m" for="report-date">
                Reporting date
              </label>
              <div id="report-date-hint" class="govuk-hint">
                For example, 2026-05-01.
              </div>
              <p id="report-date-error" class="govuk-error-message" hidden>
                <span class="govuk-visually-hidden">Error:</span> Enter a reporting date
              </p>
              <input class="govuk-input govuk-input--width-10" id="report-date" name="report-date" type="date" aria-describedby="report-date-hint">
            </div>

            <div class="govuk-form-group" id="services-group">
              <fieldset class="govuk-fieldset" aria-describedby="services-hint">
                <legend class="govuk-fieldset__legend govuk-fieldset__legend--m">
                  Services
                </legend>
                <div id="services-hint" class="govuk-hint">
                  Select one or more services to fetch reports for.
                </div>
                <p id="services-error" class="govuk-error-message" hidden>
                  <span class="govuk-visually-hidden">Error:</span> Select at least one service
                </p>
                <div class="govuk-checkboxes govuk-checkboxes--small" data-module="govuk-checkboxes">
                  <div class="govuk-checkboxes__item">
                    <input class="govuk-checkboxes__input" id="service-uk" name="service" type="checkbox" value="uk" checked>
                    <label class="govuk-label govuk-checkboxes__label" for="service-uk">
                      UK
                    </label>
                  </div>
                  <div class="govuk-checkboxes__item">
                    <input class="govuk-checkboxes__input" id="service-xi" name="service" type="checkbox" value="xi" checked>
                    <label class="govuk-label govuk-checkboxes__label" for="service-xi">
                      XI
                    </label>
                  </div>
                </div>
              </fieldset>
            </div>

            <button class="govuk-button" data-module="govuk-button" type="submit" id="fetch-reports">
              Fetch reports
            </button>
          </form>
        </div>
      </div>

      <div id="summary" class="govuk-!-margin-bottom-5" aria-live="polite"></div>
      <div id="results"></div>
    </main>
  </div>

  <script type="module">
    import { initAll } from 'https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/govuk-frontend.min.js';

    initAll();

    const bucketUrl = 'REPORTING_DOMAIN';
    const maxKeys = 5000;
    const services = {
      uk: 'UK',
      xi: 'XI',
    };

    const form = document.querySelector('#reporting-form');
    const dateInput = document.querySelector('#report-date');
    const fetchButton = document.querySelector('#fetch-reports');
    const resultsContainer = document.querySelector('#results');
    const summaryContainer = document.querySelector('#summary');
    const dateGroup = document.querySelector('#report-date-group');
    const dateError = document.querySelector('#report-date-error');
    const servicesGroup = document.querySelector('#services-group');
    const servicesError = document.querySelector('#services-error');

    initialiseForm();
    form.addEventListener('submit', handleSubmit);
    fetchReports();

    function initialiseForm() {
      const params = new URLSearchParams(window.location.search);
      dateInput.value = params.get('date') || today();

      const requestedServices = (params.get('services') || 'uk,xi')
        .split(',')
        .map((service) => service.trim())
        .filter((service) => Object.hasOwn(services, service));

      if (requestedServices.length > 0) {
        document.querySelectorAll('input[name="service"]').forEach((input) => {
          input.checked = requestedServices.includes(input.value);
        });
      }
    }

    function today() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');

      return `${year}-${month}-${day}`;
    }

    function handleSubmit(event) {
      event.preventDefault();
      fetchReports();
    }

    async function fetchReports() {
      clearErrors();

      const selectedDate = dateInput.value;
      const selectedServices = getSelectedServices();

      if (!selectedDate || selectedServices.length === 0) {
        showValidationErrors(selectedDate, selectedServices);
        return;
      }

      updateQueryString(selectedDate, selectedServices);
      setLoadingState(true);
      renderSummary(`Fetching reports for ${formatDateForDisplay(selectedDate)}.`);
      resultsContainer.innerHTML = '';

      const results = await Promise.all(selectedServices.map((service) => {
        return fetchServiceReports(service, selectedDate);
      }));

      setLoadingState(false);
      renderSummary(`Reports for ${formatDateForDisplay(selectedDate)}.`);
      renderResults(results, selectedDate);
    }

    function getSelectedServices() {
      return Array.from(document.querySelectorAll('input[name="service"]:checked'))
        .map((input) => input.value);
    }

    function clearErrors() {
      dateGroup.classList.remove('govuk-form-group--error');
      dateInput.classList.remove('govuk-input--error');
      dateInput.removeAttribute('aria-invalid');
      dateError.hidden = true;

      servicesGroup.classList.remove('govuk-form-group--error');
      servicesError.hidden = true;
    }

    function showValidationErrors(selectedDate, selectedServices) {
      if (!selectedDate) {
        dateGroup.classList.add('govuk-form-group--error');
        dateInput.classList.add('govuk-input--error');
        dateInput.setAttribute('aria-invalid', 'true');
        dateError.hidden = false;
      }

      if (selectedServices.length === 0) {
        servicesGroup.classList.add('govuk-form-group--error');
        servicesError.hidden = false;
      }
    }

    function updateQueryString(selectedDate, selectedServices) {
      const params = new URLSearchParams();
      params.set('date', selectedDate);
      params.set('services', selectedServices.join(','));
      window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
    }

    function setLoadingState(isLoading) {
      fetchButton.disabled = isLoading;
      fetchButton.textContent = isLoading ? 'Fetching reports' : 'Fetch reports';
    }

    function renderSummary(message) {
      summaryContainer.innerHTML = '';
      const paragraph = document.createElement('p');
      paragraph.className = 'govuk-body';
      paragraph.textContent = message;
      summaryContainer.append(paragraph);
    }

    async function fetchServiceReports(service, selectedDate) {
      const prefix = buildReportingPrefix(service, selectedDate);
      const url = `${bucketUrl}/?prefix=${encodeURIComponent(prefix)}&max-keys=${maxKeys}`;

      try {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const xml = await response.text();

        return {
          service,
          prefix,
          files: parseReports(xml),
        };
      } catch (error) {
        return {
          service,
          prefix,
          files: [],
          error,
        };
      }
    }

    function buildReportingPrefix(service, date) {
      const [year, month, day] = date.split('-');

      return `${service}/reporting/${year}/${month}/${day}`;
    }

    function parseReports(xml) {
      const document = new DOMParser().parseFromString(xml, 'application/xml');

      return Array.from(document.getElementsByTagName('Contents'))
        .map((content) => {
          const key = getNodeText(content, 'Key');
          const size = Number(getNodeText(content, 'Size'));
          const lastModified = getNodeText(content, 'LastModified');

          return {
            key,
            name: key.split('/').pop(),
            size,
            formattedSize: formatFileSize(size),
            lastModified,
          };
        })
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function getNodeText(node, tagName) {
      return node.getElementsByTagName(tagName)[0]?.textContent || '';
    }

    function renderResults(results, selectedDate) {
      resultsContainer.innerHTML = '';

      results.forEach((result) => {
        const section = document.createElement('section');
        section.className = 'reporting-results';
        section.setAttribute('aria-labelledby', `${result.service}-reports-heading`);

        const heading = document.createElement('h2');
        heading.className = 'govuk-heading-m';
        heading.id = `${result.service}-reports-heading`;
        heading.textContent = `${services[result.service]} reports`;
        section.append(heading);

        const status = document.createElement('div');
        status.className = 'reporting-service-status';
        section.append(status);

        if (result.error) {
          status.append(errorMessage(`Could not fetch ${services[result.service]} reports for ${formatDateForDisplay(selectedDate)}.`));
        } else if (result.files.length === 0) {
          status.append(emptyMessage(`No ${services[result.service]} reports found for ${formatDateForDisplay(selectedDate)}.`));
        } else {
          status.append(emptyMessage(`${result.files.length} ${pluralise(result.files.length, 'file')} found.`));
          section.append(buildReportsTable(result.files));
        }

        resultsContainer.append(section);
      });
    }

    function buildReportsTable(files) {
      const wrapper = document.createElement('div');
      wrapper.className = 'reporting-table-wrapper';

      const table = document.createElement('table');
      table.className = 'govuk-table';

      const thead = document.createElement('thead');
      thead.className = 'govuk-table__head';
      thead.innerHTML = `
        <tr class="govuk-table__row">
          <th scope="col" class="govuk-table__header">Report</th>
          <th scope="col" class="govuk-table__header govuk-table__header--numeric">Size</th>
          <th scope="col" class="govuk-table__header">Last modified</th>
        </tr>
      `;

      const tbody = document.createElement('tbody');
      tbody.className = 'govuk-table__body';

      files.forEach((file) => {
        const row = document.createElement('tr');
        row.className = 'govuk-table__row';

        const nameCell = document.createElement('td');
        nameCell.className = 'govuk-table__cell';

        const link = document.createElement('a');
        link.className = 'govuk-link';
        link.href = `${bucketUrl}/${file.key}`;
        link.textContent = file.name;
        nameCell.append(link);

        const sizeCell = document.createElement('td');
        sizeCell.className = 'govuk-table__cell govuk-table__cell--numeric';
        sizeCell.textContent = file.formattedSize;

        const modifiedCell = document.createElement('td');
        modifiedCell.className = 'govuk-table__cell';
        modifiedCell.textContent = formatDateTime(file.lastModified);

        row.append(nameCell, sizeCell, modifiedCell);
        tbody.append(row);
      });

      table.append(thead, tbody);
      wrapper.append(table);

      return wrapper;
    }

    function emptyMessage(message) {
      const paragraph = document.createElement('p');
      paragraph.className = 'govuk-body';
      paragraph.textContent = message;

      return paragraph;
    }

    function errorMessage(message) {
      const paragraph = document.createElement('p');
      paragraph.className = 'govuk-error-message';
      paragraph.textContent = message;

      return paragraph;
    }

    function formatFileSize(bytes) {
      if (bytes === 0) {
        return '0 bytes';
      }

      const units = ['bytes', 'KB', 'MB', 'GB', 'TB'];
      const unit = Math.floor(Math.log(bytes) / Math.log(1024));
      const value = bytes / Math.pow(1024, unit);

      return `${value.toFixed(value >= 10 || unit === 0 ? 0 : 1)} ${units[unit]}`;
    }

    function formatDateForDisplay(date) {
      return new Intl.DateTimeFormat('en-GB', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
      }).format(new Date(`${date}T00:00:00`));
    }

    function formatDateTime(value) {
      if (!value) {
        return '';
      }

      const date = new Date(value);
      const formattedDate = new Intl.DateTimeFormat('en-GB', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        timeZone: 'Europe/London',
      }).format(date);

      return `${formattedDate} at ${formatGovukTime(date)}`;
    }

    function formatGovukTime(date) {
      const time = new Intl.DateTimeFormat('en-GB', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: 'Europe/London',
      }).format(date).toLowerCase().replace(/\s/g, '').replace(':00', '');

      if (time === '12pm') {
        return 'midday';
      }

      if (time === '12am') {
        return 'midnight';
      }

      return time;
    }

    function pluralise(count, singular) {
      return count === 1 ? singular : `${singular}s`;
    }
  </script>
</body>

</html>
